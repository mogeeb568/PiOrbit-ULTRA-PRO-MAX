<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiOrbit ULTRA PRO MAX</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <header>
        <h1>🚀 PiOrbit ULTRA PRO MAX</h1>
        <p id="connection-status">🔄 Connecting...</p>
    </header>

    <nav>
        <button onclick="showPage('dashboard')">📊 Dashboard</button>
        <button onclick="showPage('wallet')">💰 Wallet</button>
        <button onclick="showPage('tasks')">✅ Tasks</button>
        <button onclick="showPage('referral')">👥 Referral</button>
        <button onclick="showPage('levels')">📈 Levels</button>
    </nav>

    <section id="dashboard" class="page active">
        <h2>Dashboard</h2>
        <div class="user-card">
            <p id="username">Loading...</p>
            <p>Points: <span id="points" class="highlight">0</span></p>
        </div>
    </section>

    <section id="wallet" class="page">
        <h2>Wallet</h2>
        <div class="wallet-card">
            <p>Balance: <span id="balance" class="highlight">0</span> Pi</p>
            <button onclick="withdraw()" class="primary-btn">Withdraw Pi</button>
        </div>
    </section>

    <section id="tasks" class="page">
        <h2>Daily Tasks</h2>
        <ul id="taskList" class="task-list"></ul>
    </section>

    <section id="referral" class="page">
        <h2>Referral Program</h2>
        <div class="referral-card">
            <p>Your Code: <span id="refCode" class="code">PIORBIT-XXXX</span></p>
            <p>Earnings: <span id="refEarn" class="highlight">0</span> Pi</p>
            <button onclick="copyRefCode()" class="secondary-btn">📋 Copy Code</button>
        </div>
    </section>

    <section id="levels" class="page">
        <h2>Level System</h2>
        <div class="level-card">
            <p>Current Level: <span id="level" class="highlight">1</span></p>
            <div class="progress-bar">
                <div id="level-progress" style="width: 0%"></div>
            </div>
            <p>Next Level: <span id="next-level">2</span> (100 points)</p>
        </div>
    </section>

    <footer>
        <p>Powered by Pi Network</p>
    </footer>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/modules/tasks.js"></script>
    <script src="assets/js/modules/referral.js"></script>
    <script src="assets/js/modules/wallet.js"></script>
</body>
</html>
