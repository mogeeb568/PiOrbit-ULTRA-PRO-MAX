
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiOrbit ULTRA PRO MAX</title>
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

<header>
<h1>PiOrbit ULTRA PRO MAX</h1>
</header>

<nav>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('wallet')">Wallet</button>
<button onclick="showPage('tasks')">Tasks</button>
<button onclick="showPage('referral')">Referral</button>
<button onclick="showPage('levels')">Levels</button>
</nav>

<section id="dashboard" class="page active">
<h2>Dashboard</h2>
<p id="username"></p>
<p>Points: <span id="points">0</span></p>
</section>

<section id="wallet" class="page">
<h2>Wallet</h2>
<p>Balance: <span id="balance">0</span> Pi</p>
<button onclick="withdraw()">Withdraw Pi</button>
</section>

<section id="tasks" class="page">
<h2>Tasks</h2>
<ul id="taskList"></ul>
</section>

<section id="referral" class="page">
<h2>Referral Earnings</h2>
<p>Your Code: <span id="refCode"></span></p>
<p>Earnings: <span id="refEarn">0</span></p>
</section>

<section id="levels" class="page">
<h2>Levels</h2>
<p>Current Level: <span id="level">1</span></p>
</section>

<script src="assets/js/config.js"></script>
<script src="assets/js/app.js"></script>
<script src="modules/tasks.js"></script>
<script src="modules/referral.js"></script>
<script src="modules/wallet.js"></script>

</body>
</html>
